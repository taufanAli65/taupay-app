@if (totalPages > 1) {
  <div class="flex items-center gap-1.5 font-sans">
    <button class="w-8 h-8 flex items-center justify-center rounded bg-white border border-gray-300 text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed text-sm font-bold shadow-sm"
      [disabled]="currentPage === 0" (click)="onPageChange(currentPage - 1)">
      &lsaquo;
    </button>
    
    @for (p of pages; track p) {
      <button class="w-8 h-8 flex items-center justify-center rounded text-sm font-bold transition-all shadow-sm"
        [class.bg-emerald-dark]="p === currentPage" [class.text-white]="p === currentPage" [class.border-emerald-dark]="p === currentPage"
        [class.bg-white]="p !== currentPage" [class.border]="true" [class.border-gray-300]="p !== currentPage" [class.text-gray-700]="p !== currentPage" [class.hover:bg-gray-50]="p !== currentPage"
        (click)="onPageChange(p)">
        {{ p + 1 }}
      </button>
    }
    
    <button class="w-8 h-8 flex items-center justify-center rounded bg-white border border-gray-300 text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed text-sm font-bold shadow-sm"
      [disabled]="currentPage >= totalPages - 1" (click)="onPageChange(currentPage + 1)">
      &rsaquo;
    </button>
  </div>
}
