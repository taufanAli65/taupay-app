<div class="animate-fade-in max-w-2xl">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-black mb-1 tracking-tight">Merchant Profile</h1>
    <p class="text-black-soft">Update your business information</p>
  </div>

  @if (profile(); as p) {
    <div class="bg-white border border-cream-dark rounded-xl p-6 shadow-sm mb-6 flex items-center gap-6">
      <div class="w-20 h-20 rounded-full flex items-center justify-center text-2xl font-bold text-white shadow-md flex-shrink-0" style="background:linear-gradient(135deg,#116A43,#0B422A)">
        {{ p.name.substring(0,2).toUpperCase() }}
      </div>
      <div>
        <h3 class="text-2xl font-bold text-black mb-1">{{ p.name }}</h3>
        <p class="text-gray-500 text-sm mb-2">{{ p.email }}</p>
        <span class="inline-block px-3 py-1 rounded-full text-xs font-bold" 
              [class.bg-green-100]="p.active" [class.text-green-700]="p.active"
              [class.bg-red-100]="!p.active" [class.text-red-700]="!p.active">
          {{ p.active ? 'Active' : 'Inactive' }}
        </span>
      </div>
    </div>
  }

  <div class="bg-white border border-cream-dark rounded-xl p-8 shadow-sm">
    <h3 class="text-xl font-bold mb-6">Edit Profile</h3>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Merchant Name *</label>
        <input type="text" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="name" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Category *</label>
        <select class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="categoryId">
          @for (cat of categories(); track cat.id) {
            <option [value]="cat.id">{{ cat.name }}</option>
          }
        </select>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Address *</label>
        <input type="text" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="address" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Payment PIN</label>
        <input type="password" inputmode="numeric" maxlength="6" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="pin" placeholder="Leave blank to keep current PIN" />
        @if (form.get('pin')?.invalid && form.get('pin')?.touched) {
          <p class="text-sm text-red-600">PIN must be exactly 6 digits.</p>
        }
      </div>
      <button type="submit" class="bg-emerald-dark hover:bg-black text-white font-semibold py-3 px-6 rounded-md transition-all disabled:opacity-50 mt-2 self-start" [disabled]="saving()">
        @if (saving()) { 
          <span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2 align-middle"></span> Saving... 
        } @else { 
          Save Changes 
        }
      </button>
    </form>
  </div>
</div>
