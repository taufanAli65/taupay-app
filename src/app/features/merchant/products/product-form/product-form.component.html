<form [formGroup]="form" class="space-y-6">
  <!-- Image Upload Section -->
  <div class="flex flex-col items-center gap-4">
    <div class="relative w-32 h-32 rounded-2xl bg-cream border-2 border-dashed border-cream-dark flex items-center justify-center overflow-hidden group shadow-sm transition-all hover:border-emerald-light">
      @if (previewUrl()) {
        <img [src]="previewUrl()" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
          <button type="button" (click)="fileInput.click()" class="w-8 h-8 rounded-full bg-white text-emerald-dark flex items-center justify-center hover:scale-110 transition-transform">
            <app-icon name="edit" class="w-4 h-4"></app-icon>
          </button>
          <button type="button" (click)="removeImage()" class="w-8 h-8 rounded-full bg-white text-red-500 flex items-center justify-center hover:scale-110 transition-transform">
            <app-icon name="trash" class="w-4 h-4"></app-icon>
          </button>
        </div>
      } @else {
        <div class="flex flex-col items-center text-gray-400 group-hover:text-emerald-light transition-colors cursor-pointer" (click)="fileInput.click()">
          <app-icon name="paperclip" class="w-8 h-8 mb-1"></app-icon>
          <span class="text-[10px] font-bold uppercase tracking-wider">Upload</span>
        </div>
      }
      <input type="file" #fileInput (change)="onFileChange($event)" accept="image/*" class="hidden">
    </div>
    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Format: JPG, PNG (Max. 2MB)</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
    <!-- Product Name -->
    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Product Name *</label>
      <input type="text" formControlName="name" placeholder="e.g. Arabica Coffee"
        class="bg-cream/30 border border-cream-dark rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-light transition-all"
        [class.border-red-300]="isInvalid('name')">
    </div>

    <!-- Category -->
    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Category</label>
      <select formControlName="categoryId"
        class="bg-cream/30 border border-cream-dark rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-light transition-all">
        <option value="">Select Category...</option>
        @for (c of categories(); track c.id) {
          <option [value]="c.id">{{ c.name }}</option>
        }
      </select>
    </div>

    <!-- Price -->
    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Price (IDR) *</label>
      <div class="relative">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-sm">Rp</span>
        <input type="text" formControlName="price" placeholder="0"
          (input)="onPriceInput($event)"
          class="w-full bg-cream/30 border border-cream-dark rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-light transition-all font-bold"
          [class.border-red-300]="isInvalid('price')">
      </div>
    </div>

    <!-- Stock -->
    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Current Stock *</label>
      <input type="number" formControlName="stock"
        class="bg-cream/30 border border-cream-dark rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-light transition-all font-mono"
        [class.border-red-300]="isInvalid('stock')">
    </div>
  </div>

  <!-- Description -->
  <div class="flex flex-col gap-1.5">
    <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Description</label>
    <textarea formControlName="description" rows="3" placeholder="Tell more about your product..."
      class="bg-cream/30 border border-cream-dark rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-light transition-all"></textarea>
  </div>
</form>
