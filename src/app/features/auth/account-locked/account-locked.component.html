<div class="min-h-screen flex items-center justify-center bg-cream p-4 relative overflow-hidden">
  <div class="w-full max-w-[460px] bg-white border border-cream-dark rounded-2xl p-8 shadow-xl relative z-10 animate-slide-up text-center">
    <div class="flex items-center justify-center mb-8">
      <div class="w-11 h-11 rounded-lg bg-emerald-dark flex items-center justify-center text-xl shadow-lg">
        <app-icon name="lock" class="w-5 h-5 text-white"></app-icon>
      </div>
    </div>

    <h1 class="text-2xl font-bold mb-2 text-black">Account Temporarily Locked</h1>
    <p class="text-black-soft text-sm mb-8">{{ message }}</p>

    <a routerLink="/auth/login" class="inline-flex items-center justify-center w-full bg-emerald-dark hover:bg-black text-white font-semibold py-3 px-4 rounded-md transition-all">
      Back to Login
    </a>
  </div>
</div>
