<div class="min-h-screen flex items-center justify-center bg-cream p-4 relative overflow-hidden">
  <div class="w-full max-w-[460px] bg-white border border-cream-dark rounded-2xl p-8 shadow-xl relative z-10 animate-slide-up">
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-11 h-11 rounded-lg bg-emerald-dark flex items-center justify-center text-xl shadow-lg">
        <app-icon name="credit-card" class="w-5 h-5 text-white"></app-icon>
      </div>
      <div class="text-2xl font-extrabold text-emerald-dark tracking-tight">TauPay</div>
    </div>

    <h1 class="text-2xl font-bold mb-1 text-black text-center">Welcome back</h1>
    <p class="text-black-soft text-sm mb-6 text-center">Sign in to your account to continue</p>

    <form class="flex flex-col gap-4" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-black-soft uppercase tracking-wider" for="email">Email</label>
        <input id="email" type="email" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all"
          [class.border-red-500]="isInvalid('email')" [class.focus:ring-red-500]="isInvalid('email')"
          formControlName="email" placeholder="you@example.com" autocomplete="email" />
        @if (isInvalid('email')) {
          <span class="text-xs text-red-500 flex items-center gap-1 mt-1">
            <app-icon name="warning" class="w-3.5 h-3.5"></app-icon>
            Please enter a valid email
          </span>
        }
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-black-soft uppercase tracking-wider" for="password">Password</label>
        <div class="relative">
          <input id="password" [type]="showPass() ? 'text' : 'password'"
            class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all"
            [class.border-red-500]="isInvalid('password')" [class.focus:ring-red-500]="isInvalid('password')"
            formControlName="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-black" (click)="showPass.set(!showPass())">
            <app-icon [name]="showPass() ? 'eye-off' : 'eye'" class="w-4 h-4"></app-icon>
          </button>
        </div>
        @if (isInvalid('password')) {
          <span class="text-xs text-red-500 flex items-center gap-1 mt-1">
            <app-icon name="warning" class="w-3.5 h-3.5"></app-icon>
            Password is required
          </span>
        }
      </div>

      <button type="submit" class="w-full bg-emerald-dark hover:bg-black text-white font-semibold py-3 px-4 rounded-md transition-all disabled:opacity-50 disabled:cursor-not-allowed mt-2"
        [disabled]="form.invalid || authService.isLoading()">
        @if (authService.isLoading()) {
          <span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2 align-middle"></span> Signing in...
        } @else {
          Sign in
        }
      </button>
    </form>

    <div class="text-center text-sm text-gray-400 relative my-6 before:content-[''] before:absolute before:top-1/2 before:left-0 before:w-[40%] before:h-px before:bg-cream-dark after:content-[''] after:absolute after:top-1/2 after:right-0 after:w-[40%] after:h-px after:bg-cream-dark">or</div>

    <div class="flex flex-col gap-3">
      <a routerLink="/auth/register" class="block text-center p-3 border-2 border-cream-dark rounded-lg text-black-soft text-sm font-medium transition-all hover:border-emerald-dark hover:text-emerald-dark hover:bg-emerald-dark/5">
        Register as User
      </a>
      <a routerLink="/auth/register-merchant" class="block text-center p-3 border-2 border-cream-dark rounded-lg text-black-soft text-sm font-medium transition-all hover:border-emerald-dark hover:text-emerald-dark hover:bg-emerald-dark/5">
        Register as Merchant
      </a>
    </div>
  </div>
</div>
