<div class="animate-fade-in">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-black mb-1 tracking-tight">My Profile</h1>
    <p class="text-black-soft">Manage your account information</p>
  </div>

  <div class="max-w-2xl">
    <div class="bg-white border border-cream-dark rounded-xl p-8 shadow-sm">
      <h3 class="text-xl font-bold mb-6">Personal Information</h3>
      <form class="flex flex-col gap-5" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="grid grid-cols-2 gap-5">
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">First Name</label>
            <input type="text" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="firstName" />
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Last Name</label>
            <input type="text" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="lastName" />
          </div>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Address</label>
          <input type="text" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="address" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Date of Birth</label>
          <input type="date" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="birthDate" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Payment PIN</label>
          <input type="password" inputmode="numeric" maxlength="6" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="pin" placeholder="Leave blank to keep current PIN" />
          @if (form.get('pin')?.invalid && form.get('pin')?.touched) {
            <p class="text-sm text-red-600">PIN must be exactly 6 digits.</p>
          }
        </div>
        <button type="submit" class="bg-emerald-dark hover:bg-black text-white font-semibold py-3 px-6 rounded-md transition-all disabled:opacity-50 mt-2 self-start" [disabled]="saving()">
          @if (saving()) { 
            <span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2 align-middle"></span> Saving... 
          } @else { 
            Save Changes 
          }
        </button>
      </form>
    </div>
  </div>
</div>
