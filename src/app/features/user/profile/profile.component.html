<div class="animate-fade-in">
  <div class="max-w-md mx-auto px-4 py-4">
    <h1 class="text-2xl font-bold mb-2">My Profile</h1>
    <p class="text-sm text-gray-600 mb-4">Manage your account information</p>

    <div class="bg-white border border-cream-dark rounded-xl p-4 shadow-sm">
      <form class="flex flex-col gap-4" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="flex flex-col">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">First Name</label>
          <input type="text" formControlName="firstName"
            class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5" />
        </div>

        <div class="flex flex-col">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Last Name</label>
          <input type="text" formControlName="lastName"
            class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5" />
        </div>

        <div class="flex flex-col">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Address</label>
          <input type="text" formControlName="address"
            class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5" />
        </div>

        <div class="flex flex-col">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Date of Birth</label>
          <input type="date" formControlName="birthDate"
            class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5" />
        </div>

        <div class="flex flex-col">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Payment PIN</label>
          <input type="password" inputmode="numeric" maxlength="6" formControlName="pin"
            class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5" placeholder="Leave blank to keep current PIN" />
          @if (form.get('pin')?.invalid && form.get('pin')?.touched) {
          <p class="text-sm text-red-600">PIN must be exactly 6 digits.</p>
          }
        </div>

        <button type="submit" [disabled]="saving()"
          class="w-full bg-emerald-dark hover:bg-black text-white font-semibold py-3 rounded-md transition-all">
          @if (saving()) {
          <span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2 align-middle"></span>
          Saving...
          } @else {
          Save Changes
          }
        </button>
      </form>
    </div>
  </div>
</div>
