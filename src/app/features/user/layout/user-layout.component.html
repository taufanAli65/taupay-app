<div class="min-h-screen bg-cream font-sans text-black flex flex-col">
  <header class="h-14 bg-white border-b border-cream-dark flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded bg-emerald-dark flex items-center justify-center text-sm shadow text-white font-bold">
        <app-icon name="credit-card" class="w-4 h-4 text-white"></app-icon>
      </div>
      <div class="text-sm font-semibold">TauPay</div>
    </div>
    <div class="w-8 h-8 rounded-full bg-emerald-dark text-white flex items-center justify-center text-sm font-bold">
      {{ initials }}</div>
  </header>

  <main class="flex-1 overflow-y-auto pb-20 p-4">
    <router-outlet />
  </main>

  <nav class="fixed bottom-0 inset-x-0 h-16 bg-white border-t flex items-center justify-around">
    <a routerLink="/user/dashboard" routerLinkActive="active" class="flex flex-col items-center text-sm">
      <app-icon name="dashboard" class="w-5 h-5"></app-icon>
      <span class="text-[0.65rem]">Dashboard</span>
    </a>
    <a routerLink="/user/transactions/history" routerLinkActive="active" class="flex flex-col items-center text-sm">
      <app-icon name="credit-card" class="w-5 h-5"></app-icon>
      <span class="text-[0.65rem]">Payments</span>
    </a>
    <a routerLink="/user/transactions/pay" routerLinkActive="active" class="flex flex-col items-center text-sm">
      <app-icon name="camera" class="w-5 h-5"></app-icon>
      <span class="text-[0.65rem]">Pay</span>
    </a>
    <a routerLink="/user/profile" routerLinkActive="active" class="flex flex-col items-center text-sm">
      <app-icon name="user" class="w-5 h-5"></app-icon>
      <span class="text-[0.65rem]">Profile</span>
    </a>
  </nav>
</div>
