<div class="animate-fade-in w-full">
  <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold text-black mb-1 tracking-tight">My Payments</h1>
      <p class="text-black-soft">Your payment history</p>
    </div>
    <a routerLink="/user/transactions/pay"
      class="bg-emerald-dark hover:bg-black text-white font-semibold py-2 px-5 rounded-md transition-all flex items-center gap-2">
      <app-icon name="plus" class="w-4 h-4"></app-icon>
      Pay via QR
    </a>
  </div>

  <!-- Filters -->
  <div class="bg-white border border-cream-dark rounded-xl p-4 shadow-sm mb-6">
    <div class="grid grid-cols-1 md:grid-cols-[1fr_1fr_auto] gap-4 items-end">
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Start Date</label>
        <div class="relative">
          <input type="date" 
            [ngModel]="store.startDate()"
            (ngModelChange)="store.setStartDate($event)"
            class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" />
          <app-icon name="calendar" class="w-4 h-4 text-gray-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none"></app-icon>
        </div>
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">End Date</label>
        <div class="relative">
          <input type="date" 
            [ngModel]="store.endDate()"
            (ngModelChange)="store.setEndDate($event)"
            class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" />
          <app-icon name="calendar" class="w-4 h-4 text-gray-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none"></app-icon>
        </div>
      </div>
      <div class="flex gap-2">
        <button class="bg-emerald-dark hover:bg-black text-white font-semibold py-2.5 px-5 rounded-md transition-all flex items-center gap-2" (click)="store.applyFilters()">
          <app-icon name="search" class="w-4 h-4"></app-icon>
          Apply
        </button>
        <button class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-2.5 px-5 rounded-md transition-all flex items-center gap-2" (click)="store.resetFilters()">
          <app-icon name="trash" class="w-4 h-4"></app-icon>
          Clear
        </button>
      </div>
    </div>
  </div>

  <app-data-table 
    [data]="store.items()" 
    [columns]="columns"
    [loading]="store.loading()"
    [showSearch]="false"
    [currentPage]="store.currentPage()"
    [totalPages]="store.totalPages()"
    [totalElements]="store.totalElements()"
    (pageChange)="store.loadPage($event)"
    [customTemplates]="{ 
      merchantInfo: merchantTpl, 
      amountInfo: amountTpl
    }">
  </app-data-table>
</div>

<!-- Template: Merchant & Category -->
<ng-template #merchantTpl let-item>
  <div class="flex flex-col gap-0.5">
    <span class="font-bold text-sm text-black">{{ item.counterpartyName || 'Merchant' }}</span>
    <span class="text-[10px] text-gray-400 font-black uppercase tracking-wider">{{ item.category || 'Payment' }}</span>
  </div>
</ng-template>

<!-- Template: Amount & Date -->
<ng-template #amountTpl let-item>
  <div class="flex flex-col items-end gap-0.5">
    <span class="font-black text-sm text-black">{{ itemAmount(item) | currencyIdr }}</span>
    <span class="text-[10px] text-gray-400 font-medium">{{ itemDate(item) | date:'medium' }}</span>
  </div>
</ng-template>
