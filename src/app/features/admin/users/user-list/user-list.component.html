<div class="animate-fade-in w-full">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-black mb-1 tracking-tight">Users</h1>
    <p class="text-black-soft">Manage all user accounts</p>
  </div>

  <app-data-table 
    [data]="store.users()" 
    [columns]="columns"
    [loading]="store.loading()"
    [filters]="userFilters"
    [activeFilters]="store.activeFilters()"
    [currentPage]="store.currentPage()"
    [totalPages]="store.totalPages()"
    [totalElements]="store.totalElements()"
    [searchQuery]="store.searchQuery()"
    searchPlaceholder="Search..."
    (search)="store.setSearchQuery($event)"
    (filterChange)="store.setActiveFilters($event)"
    (pageChange)="store.loadPage($event)"
    [customTemplates]="{ user: userTpl, status: statusTpl, actions: actionTpl }">
  </app-data-table>
</div>

<ng-template #userTpl let-u>
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-full bg-cream-dark text-black font-bold flex items-center justify-center text-sm group-hover:bg-emerald-dark group-hover:text-white transition-colors">
      {{ initials(u) }}
    </div>
    <div class="font-bold text-sm text-black">{{ u.firstName }} {{ u.lastName }}</div>
  </div>
</ng-template>

<ng-template #statusTpl let-u>
  <span class="inline-block px-3 py-1 rounded-full text-xs font-bold"
        [class.bg-green-100]="u.isActive" [class.text-green-700]="u.isActive"
        [class.bg-red-100]="!u.isActive" [class.text-red-700]="!u.isActive">
    {{ u.isActive ? 'Active' : 'Inactive' }}
  </span>
</ng-template>

<ng-template #actionTpl let-u>
  <div class="flex justify-end gap-2">
    <a [routerLink]="['/admin/users', u.id]" 
       class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-1.5 px-3 rounded text-xs transition-all shadow-sm">
      View
    </a>
    @if (u.isActive) {
      <button class="bg-red-50 hover:bg-red-100 text-red-600 font-bold py-1.5 px-3 rounded text-xs transition-all border border-red-200" 
              (click)="store.toggleStatus(u, false)">
        Deactivate
      </button>
    } @else {
      <button class="bg-green-50 hover:bg-green-100 text-green-700 font-bold py-1.5 px-3 rounded text-xs transition-all border border-green-200" 
              (click)="store.toggleStatus(u, true)">
        Activate
      </button>
    }
  </div>
</ng-template>
