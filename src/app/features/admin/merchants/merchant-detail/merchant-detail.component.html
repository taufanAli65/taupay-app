<div class="animate-fade-in max-w-2xl">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-black mb-1 tracking-tight">{{ isNew ? 'Add Merchant' : 'Edit Merchant' }}</h1>
      <p class="text-black-soft">{{ isNew ? 'Create a new merchant account' : 'Update merchant information' }}</p>
    </div>
    <a routerLink="/admin/merchants" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-2 px-4 rounded-md transition-all shadow-sm text-sm">
      ← Back
    </a>
  </div>

  <div class="bg-white border border-cream-dark rounded-xl p-8 shadow-sm">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Merchant Name *</label>
        <input type="text" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="name" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Category *</label>
        <select class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="categoryId">
          <option value="">Select...</option>
          @for (c of categories(); track c.id) {
            <option [value]="c.id">{{ c.name }}</option>
          }
        </select>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Address *</label>
        <input type="text" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="address" />
      </div>
      
      @if (isNew) {
        <div class="flex flex-col gap-1.5 mt-2 pt-4 border-t border-cream-dark">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Email *</label>
          <input type="email" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="email" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Password *</label>
          <input type="password" class="w-full bg-cream border border-cream-dark rounded-md px-4 py-2.5 text-black focus:outline-none focus:border-emerald-dark focus:ring-1 focus:ring-emerald-dark transition-all" formControlName="password" placeholder="Min. 8 characters" />
        </div>
      }
      
      <div class="flex gap-3 mt-4">
        <button type="submit" class="bg-emerald-dark hover:bg-black text-white font-semibold py-2.5 px-6 rounded-md transition-all disabled:opacity-50" [disabled]="saving()">
          @if (saving()) { 
            <span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2 align-middle"></span> Saving... 
          } @else { 
            {{ isNew ? 'Create Merchant' : 'Save Changes' }} 
          }
        </button>
        <a routerLink="/admin/merchants" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-2.5 px-6 rounded-md transition-all shadow-sm">Cancel</a>
      </div>
    </form>
  </div>
</div>
