<div class="animate-fade-in w-full">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-black mb-1 tracking-tight">Merchants</h1>
      <p class="text-black-soft">Manage all merchant accounts</p>
    </div>
    <a routerLink="/admin/merchants/new" class="bg-emerald-dark hover:bg-black text-white font-bold py-2.5 px-5 rounded-lg transition-all shadow-md">
      + Add Merchant
    </a>
  </div>

  <app-data-table 
    [data]="store.merchants()" 
    [columns]="columns"
    [loading]="store.loading()"
    [filters]="merchantFilters()"
    [activeFilters]="store.activeFilters()"
    [currentPage]="store.currentPage()"
    [totalPages]="store.totalPages()"
    [totalElements]="store.totalElements()"
    [searchQuery]="store.searchQuery()"
    searchPlaceholder="Search merchants..."
    (search)="store.setSearchQuery($event)"
    (filterChange)="store.setActiveFilters($event)"
    (pageChange)="store.loadPage($event)"
    [customTemplates]="{ merchant: merchantTpl, categoryName: categoryTpl, status: statusTpl, actions: actionTpl }">
  </app-data-table>
</div>
<ng-template #merchantTpl let-m>
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-full bg-cream-dark text-black font-bold flex items-center justify-center text-sm group-hover:bg-emerald-dark group-hover:text-white transition-colors shadow-sm">
      {{ m.name.substring(0,2).toUpperCase() }}
    </div>
    <div class="font-bold text-sm text-black">{{ m.name }}</div>
  </div>
</ng-template>


<ng-template #categoryTpl let-m>
  <span class="inline-block px-2.5 py-1 bg-cream-dark text-black-soft rounded text-xs font-bold">
    {{ m.categoryName || '—' }}
  </span>
</ng-template>

<ng-template #statusTpl let-m>
  <span class="inline-block px-3 py-1 rounded-full text-xs font-bold"
        [class.bg-green-100]="m.active" [class.text-green-700]="m.active"
        [class.bg-red-100]="!m.active" [class.text-red-700]="!m.active">
    {{ m.active ? 'Active' : 'Inactive' }}
  </span>
</ng-template>

<ng-template #actionTpl let-m>
  <div class="flex justify-end gap-2">
    <a [routerLink]="['/admin/merchants', m.id]" 
       class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-1.5 px-3 rounded text-xs transition-all shadow-sm">
      Edit
    </a>
    @if (m.active) {
      <button class="bg-red-50 hover:bg-red-100 text-red-600 font-bold py-1.5 px-3 rounded text-xs transition-all border border-red-200" 
              (click)="store.toggleStatus(m, false)">
        Deactivate
      </button>
    } @else {
      <button class="bg-green-50 hover:bg-green-100 text-green-700 font-bold py-1.5 px-3 rounded text-xs transition-all border border-green-200" 
              (click)="store.toggleStatus(m, true)">
        Activate
      </button>
    }
  </div>
</ng-template>
